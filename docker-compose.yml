services:
  ag-redis:
    image: redis:alpine
    container_name: ag-redis
    ports:
      - "6379:6379"
    networks:
      - aetherguard_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 5

  ag-api:
    build:
      context: .
      dockerfile: api-core/Dockerfile
    container_name: ag-api
    ports:
      - "8080:8080"
    volumes:
      - ./shared-data:/app/shared
    env_file:
      - .env
    depends_on:
      ag-redis:                           # <--- Hyphen removed!
        condition: service_healthy
    networks:
      - aetherguard_net

  ag-ai:
    build:
      context: .
      dockerfile: ai-worker/Dockerfile
    container_name: ag-ai
    volumes:
      - ./shared-data:/app/shared
    env_file:
      - .env
    depends_on:
      ag-redis:                           # <--- Updated!
        condition: service_healthy
    networks:
      - aetherguard_net

  ag-sdr-live:
    build:
      context: .
      dockerfile: sdr-daemon/Dockerfile
    container_name: ag-sdr-live
    volumes:
      - ./shared-data:/app/shared
    environment:
      - SDR_RELAY_HOST=${SDR_RELAY_HOST:-host.docker.internal}
      - SDR_RELAY_DATA_PORT=${SDR_RELAY_DATA_PORT:-7373}
      - SDR_RELAY_CTRL_PORT=${SDR_RELAY_CTRL_PORT:-7374}
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    depends_on:
      ag-redis:                           # <--- Updated!
        condition: service_healthy
    networks:
      - aetherguard_net

networks:
  aetherguard_net:
    driver: bridge